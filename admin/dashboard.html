<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard · O Seu Psico Testes</title>
  <link rel="icon" href="../assets/logo.png" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="admin-body">

  <nav class="admin-navbar">
    <div class="container">
      <div class="admin-navbar__inner">
        <div class="admin-navbar__logo">
          <img src="../assets/logo.png" alt="O Seu Psico" />
          <span class="admin-navbar__logo-text">O Seu Psico</span>
          <span class="admin-navbar__badge">Admin · Testes</span>
        </div>
        <span class="admin-logout" onclick="logout()">Sair →</span>
      </div>
    </div>
  </nav>

  <main class="admin-main">
    <div class="container">

      <!-- Stats -->
      <div class="admin-stats" id="admin-stats">
        <div class="admin-stat">
          <div class="admin-stat__num" id="stat-total">—</div>
          <div class="admin-stat__label">Testes realizados</div>
        </div>
        <div class="admin-stat">
          <div class="admin-stat__num" id="stat-hoje">—</div>
          <div class="admin-stat__label">Hoje</div>
        </div>
        <div class="admin-stat">
          <div class="admin-stat__num" id="stat-tema">—</div>
          <div class="admin-stat__label">Tema mais buscado</div>
        </div>
        <div class="admin-stat">
          <div class="admin-stat__num" id="stat-grave">—</div>
          <div class="admin-stat__label">Resultados graves</div>
        </div>
        <div class="admin-stat">
          <div class="admin-stat__num" id="stat-idade-media">—</div>
          <div class="admin-stat__label">Média de idade</div>
        </div>
      </div>

      <!-- Filtros -->
      <div class="admin-filters">
        <input type="text" id="filtro-busca" placeholder="Buscar por nome ou e-mail..." oninput="aplicarFiltros()" style="flex:1;min-width:200px;" />
        <select id="filtro-tipo" onchange="aplicarFiltros()">
          <option value="">Todos os tipos</option>
          <option value="rastreio">Rastreios</option>
          <option value="desempenho">Testes de desempenho</option>
          <option value="bateria">Baterias</option>
        </select>
        <select id="filtro-faixa" onchange="aplicarFiltros()">
          <option value="">Todas as faixas</option>
          <option value="minimal">Mínima / Baixo</option>
          <option value="mild">Leve / Moderado</option>
          <option value="moderate">Moderada</option>
          <option value="severe">Grave / Alto</option>
          <option value="good">Boa (desempenho)</option>
          <option value="poor">Baixa (desempenho)</option>
        </select>
        <label style="display:flex;align-items:center;gap:6px;font-size:0.85rem;color:var(--text-mid);">
          De <input type="date" id="filtro-de" onchange="carregarDados()" style="width:auto;" />
        </label>
        <label style="display:flex;align-items:center;gap:6px;font-size:0.85rem;color:var(--text-mid);">
          Até <input type="date" id="filtro-ate" onchange="carregarDados()" style="width:auto;" />
        </label>
        <button class="btn btn--outline" onclick="exportarCSV()" style="padding:10px 18px;font-size:0.85rem;">⬇ Exportar CSV</button>
      </div>

      <div class="admin-bulk-actions" id="bulk-actions" style="display:none;">
        <span id="bulk-count"></span>
        <button class="btn btn--outline" style="color:var(--error);border-color:var(--error);" onclick="excluirSelecionados()">🗑 Excluir selecionados</button>
      </div>

      <!-- Tabela -->
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th><input type="checkbox" id="chk-todos" onchange="toggleTodos(this.checked)" /></th>
              <th>Nome</th>
              <th>E-mail</th>
              <th>Telefone</th>
              <th>Idade</th>
              <th>Tipo</th>
              <th>Identificador</th>
              <th>Faixa geral</th>
              <th>Data</th>
              <th></th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tabela-body">
            <tr><td colspan="11" style="text-align:center;color:var(--text-light);padding:40px;">Carregando dados...</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </main>

  <!-- Modal de detalhes -->
  <div class="modal-overlay" id="modal-overlay" onclick="fecharModal(event)">
    <div class="modal">
      <div class="modal__header">
        <div class="modal__title" id="modal-title">Detalhes</div>
        <button class="modal__close" onclick="fecharModal()">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="../data/testes.js"></script>
  <script src="../data/baterias.js"></script>
  <script>
    const token = sessionStorage.getItem('psico_admin_token');
    if (!token) location.href = '/testes/admin/';

    // Rótulos legíveis pra identificadores que não são "tema" de rastreio
    // (testes de desempenho e, futuramente, baterias)
    const IDENTIFICADORES_LABEL = {
      igt: '🃏 Teste de Julgamento',
      bart: '🎈 Decisão Progressiva',
      icar: '🧩 Teste de Raciocínio Lógico',
      stroop: '🎨 Teste de Atenção Seletiva',
      tmt: '🔢 Teste de Velocidade Mental',
      corsi: '🔲 Teste de Memória Espacial',
      nback: '🧠 Teste de Memória de Trabalho',
      flanker: '➡️ Teste de Concentração',
      pvt: '⏱️ Teste de Atenção Sustentada',
    };

    let todosRegistros = [];
    let filtrados = [];
    let selecionados = new Set();

    async function carregarDados() {
      selecionados.clear();
      atualizarBulkActions();

      const de = document.getElementById('filtro-de').value;
      const ate = document.getElementById('filtro-ate').value;
      const qs = new URLSearchParams();
      if (de) qs.set('de', de);
      if (ate) qs.set('ate', ate);

      try {
        const res = await fetch('/testes/api/admin/dados' + (qs.toString() ? '?' + qs.toString() : ''), {
          headers: { 'Authorization': 'Bearer ' + token },
        });
        if (res.status === 401) { logout(); return; }
        const data = await res.json();
        todosRegistros = data.registros || [];
        atualizarStats();
        aplicarFiltros();
      } catch {
        document.getElementById('tabela-body').innerHTML =
          '<tr><td colspan="11" style="text-align:center;color:var(--error);">Erro ao carregar dados.</td></tr>';
      }
    }

    function identificadorLabel(r) {
      if (r.tipo === 'rastreio') {
        const tema = TEMAS[r.identificador];
        return tema ? `${tema.icon} ${tema.nome}` : r.identificador;
      }
      if (r.tipo === 'bateria') {
        const bat = BATERIAS[r.identificador];
        return bat ? `${bat.icon} ${bat.nome}` : r.identificador;
      }
      return IDENTIFICADORES_LABEL[r.identificador] || r.identificador;
    }

    function atualizarStats() {
      const hoje = new Date().toISOString().slice(0, 10);
      const totalHoje = todosRegistros.filter(r => r.criado_em?.startsWith(hoje)).length;
      const graves = todosRegistros.filter(r => r.faixa_geral === 'severe').length;

      const idCount = {};
      todosRegistros.forEach(r => { idCount[r.identificador] = (idCount[r.identificador] || 0) + 1; });
      const maisFrequente = Object.entries(idCount).sort((a, b) => b[1] - a[1])[0];

      const idades = todosRegistros.map(r => r.idade).filter(i => Number.isFinite(i));
      const idadeMedia = idades.length ? Math.round(idades.reduce((a, b) => a + b, 0) / idades.length) : null;

      document.getElementById('stat-total').textContent = todosRegistros.length;
      document.getElementById('stat-hoje').textContent = totalHoje;
      document.getElementById('stat-tema').textContent = maisFrequente
        ? (TEMAS[maisFrequente[0]]?.nome || IDENTIFICADORES_LABEL[maisFrequente[0]] || maisFrequente[0])
        : '—';
      document.getElementById('stat-grave').textContent = graves;
      document.getElementById('stat-idade-media').textContent = idadeMedia !== null ? `${idadeMedia} anos` : '—';
    }

    function aplicarFiltros() {
      const busca = document.getElementById('filtro-busca').value.toLowerCase();
      const tipo = document.getElementById('filtro-tipo').value;
      const faixa = document.getElementById('filtro-faixa').value;

      filtrados = todosRegistros.filter(r => {
        const matchBusca = !busca || r.nome?.toLowerCase().includes(busca) || r.email?.toLowerCase().includes(busca);
        const matchTipo = !tipo || r.tipo === tipo;
        const matchFaixa = !faixa || r.faixa_geral === faixa;
        return matchBusca && matchTipo && matchFaixa;
      });

      renderTabela();
    }

    function renderTabela() {
      const tbody = document.getElementById('tabela-body');
      if (!filtrados.length) {
        tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;color:var(--text-light);padding:32px;">Nenhum registro encontrado.</td></tr>';
        return;
      }

      const tipoLabel = { rastreio: 'Rastreio', desempenho: 'Desempenho', bateria: 'Bateria' };
      const faixaLabel = { minimal: 'Mínima', mild: 'Leve', moderate: 'Moderada', severe: 'Grave', good: 'Boa', poor: 'Baixa' };

      tbody.innerHTML = filtrados.map((r, i) => {
        const data = r.criado_em ? new Date(r.criado_em).toLocaleDateString('pt-BR') : '—';
        return `<tr>
          <td><input type="checkbox" data-id="${r.id}" onchange="toggleSelecionado(${r.id}, this.checked)" ${selecionados.has(r.id) ? 'checked' : ''} /></td>
          <td><strong>${r.nome || '—'}</strong></td>
          <td>${r.email || '—'}</td>
          <td>${r.telefone || '—'}</td>
          <td>${r.idade || '—'}</td>
          <td>${tipoLabel[r.tipo] || r.tipo}</td>
          <td>${identificadorLabel(r)}</td>
          <td>${r.faixa_geral ? `<span class="result-summary__badge faixa--${r.faixa_geral}">${faixaLabel[r.faixa_geral] || r.faixa_geral}</span>` : '—'}</td>
          <td>${data}</td>
          <td><button class="admin-table__btn" onclick="abrirModal(${i})">Ver</button></td>
          <td><button class="admin-table__btn" style="color:var(--error);" onclick="excluirUm(${r.id})">Excluir</button></td>
        </tr>`;
      }).join('');
    }

    function toggleSelecionado(id, checked) {
      if (checked) selecionados.add(id); else selecionados.delete(id);
      atualizarBulkActions();
    }

    function toggleTodos(checked) {
      selecionados = checked ? new Set(filtrados.map(r => r.id)) : new Set();
      renderTabela();
      atualizarBulkActions();
    }

    function atualizarBulkActions() {
      const el = document.getElementById('bulk-actions');
      if (selecionados.size > 0) {
        el.style.display = 'flex';
        document.getElementById('bulk-count').textContent = `${selecionados.size} selecionado(s)`;
      } else {
        el.style.display = 'none';
      }
    }

    async function excluirUm(id) {
      if (!confirm('Excluir este registro? Essa ação não pode ser desfeita.')) return;
      await fetch(`/testes/api/admin/dados/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token },
      });
      carregarDados();
    }

    async function excluirSelecionados() {
      if (!selecionados.size) return;
      if (!confirm(`Excluir ${selecionados.size} registro(s)? Essa ação não pode ser desfeita.`)) return;
      await fetch('/testes/api/admin/dados/excluir-lote', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ ids: Array.from(selecionados) }),
      });
      carregarDados();
    }

    function abrirModal(i) {
      const r = filtrados[i];
      let resultados = {};
      try { resultados = typeof r.resultados === 'string' ? JSON.parse(r.resultados) : r.resultados; } catch {}

      document.getElementById('modal-title').textContent = r.nome || 'Detalhes';

      let html = `
        <div class="modal__row"><strong>Nome</strong><span>${r.nome}</span></div>
        <div class="modal__row"><strong>E-mail</strong><span>${r.email}</span></div>
        <div class="modal__row"><strong>Telefone</strong><span>${r.telefone || '—'}</span></div>
        <div class="modal__row"><strong>Idade</strong><span>${r.idade || '—'} anos</span></div>
        <div class="modal__row"><strong>Tipo</strong><span>${identificadorLabel(r)}</span></div>
        <div class="modal__row"><strong>Data</strong><span>${r.criado_em ? new Date(r.criado_em).toLocaleString('pt-BR') : '—'}</span></div>
        <div class="modal__row"><strong>Consentimento de dados</strong><span>${r.consentimento_dados_em ? new Date(r.consentimento_dados_em).toLocaleString('pt-BR') : '—'}</span></div>
        <div class="modal__row"><strong>Consentimento do instrumento</strong><span>${r.consentimento_instrumento_em ? new Date(r.consentimento_instrumento_em).toLocaleString('pt-BR') : '—'}</span></div>
        <div class="modal__divider"></div>
        <div style="font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-light);margin-bottom:12px;">Resultado</div>
      `;

      if (r.tipo === 'rastreio') {
        const faixaLabel = { minimal: 'Mínima', mild: 'Leve', moderate: 'Moderada', severe: 'Grave' };
        Object.entries(resultados).forEach(([escalaId, res]) => {
          const escala = ESCALAS[escalaId];
          html += `
            <div class="modal__scale-result">
              <span>${escala ? escala.nomeCompleto : escalaId}</span>
              <span><strong>${res.score}/${res.scoreMax}</strong> &nbsp; <span class="result-summary__badge faixa--${res.classe}">${res.faixa || faixaLabel[res.classe]}</span></span>
            </div>
          `;
        });
      } else if (r.tipo === 'bateria') {
        // Bateria: cada item aparece separadamente, sem faixa geral combinada
        const bat = BATERIAS[r.identificador];
        Object.entries(resultados).forEach(([itemId, res]) => {
          const nomeItem = bat?.itens.find(it => (it.escalaId || it.instrumentoId) === itemId)?.nome || itemId;
          html += `
            <div class="modal__scale-result">
              <span>${nomeItem}</span>
              <span><strong>${res.score}${res.scoreMax ? '/' + res.scoreMax : ''}</strong> &nbsp; <span class="result-summary__badge faixa--${res.classe}">${res.faixa || res.classe}</span></span>
            </div>
          `;
        });
      } else {
        // Testes de desempenho: score/faixa direto + métricas específicas do instrumento
        html += `
          <div class="modal__scale-result">
            <span>Escore</span>
            <span><strong>${resultados.score}</strong> &nbsp; <span class="result-summary__badge faixa--${resultados.classe}">${resultados.faixa}</span></span>
          </div>
          <div class="modal__row"><strong>Métricas</strong><span style="font-size:0.8rem;">${JSON.stringify(resultados.metricas || {})}</span></div>
        `;
      }

      document.getElementById('modal-body').innerHTML = html;
      document.getElementById('modal-overlay').classList.add('open');
    }

    function fecharModal(e) {
      if (!e || e.target === document.getElementById('modal-overlay')) {
        document.getElementById('modal-overlay').classList.remove('open');
      }
    }

    function exportarCSV() {
      const linhas = [['Nome', 'E-mail', 'Telefone', 'Idade', 'Tipo', 'Identificador', 'Faixa Geral', 'Data']];
      filtrados.forEach(r => {
        linhas.push([
          r.nome, r.email, r.telefone, r.idade,
          r.tipo, identificadorLabel(r), r.faixa_geral,
          r.criado_em ? new Date(r.criado_em).toLocaleDateString('pt-BR') : '',
        ]);
      });
      const csv = linhas.map(l => l.map(v => `"${v ?? ''}"`).join(',')).join('\n');
      const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'oseupsico-testes.csv'; a.click();
    }

    function logout() {
      sessionStorage.removeItem('psico_admin_token');
      location.href = '/testes/admin/';
    }

    carregarDados();
  </script>
</body>
</html>
