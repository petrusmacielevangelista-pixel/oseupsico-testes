<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teste de Memória de Trabalho · O Seu Psico</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <div class="navbar__inner">
        <a href="/testes/" class="navbar__logo">
          <img src="assets/logo.png" alt="O Seu Psico" />
          <span class="navbar__logo-text">O Seu Psico<span></span></span>
          <span class="navbar__badge">Testes</span>
        </a>
      </div>
    </div>
  </nav>

  <section class="igt-section">
    <div class="container" style="max-width:560px;text-align:center;">
      <div id="progresso" style="font-size:0.85rem;color:var(--text-light);margin-bottom:8px;">1 / 22</div>
      <p style="font-size:0.95rem;color:var(--text-mid);margin-bottom:32px;">
        Clique em <strong>"É igual"</strong> sempre que a letra atual for igual à que apareceu <strong>2 posições atrás</strong>.
      </p>

      <div style="height:clamp(90px,16vh,140px);display:flex;align-items:center;justify-content:center;margin-bottom:20px;">
        <div id="letra-estimulo" style="font-family:var(--font-display);font-size:4.5rem;font-weight:800;color:var(--black);"></div>
      </div>

      <button class="btn btn--yellow btn--lg" onclick="responderMatch()" style="min-width:200px;">É igual</button>
    </div>
  </section>

  <script src="data/baterias.js"></script>
  <script src="js/bateria.js"></script>
  <script src="js/nback.js"></script>
  <script>
    if (!sessionStorage.getItem('psico_cadastro')) { window.location.href = '/testes/'; }
  </script>
</body>
</html>
